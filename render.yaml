services:
  - type: web
    name: adaptador-tdah
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      npm install
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false   # você preenche manualmente no painel do Render
    autoDeploy: true
