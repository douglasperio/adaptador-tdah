<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adaptador de Questões — TDAH | Unilavras</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #F0F4F9;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #185FA5;
      color: #fff;
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    header .logo { font-size: 22px; }
    header h1 { font-size: 17px; font-weight: 600; line-height: 1.3; }
    header p  { font-size: 12px; opacity: 0.8; margin-top: 2px; }

    .container { max-width: 720px; margin: 2rem auto; padding: 0 1.25rem 3rem; }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 1.75rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 1.25rem;
    }
    .card h2 { font-size: 15px; font-weight: 600; color: #185FA5; margin-bottom: 1rem; }

    label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; font-weight: 500; }

    input[type="text"], input[type="number"], select {
      width: 100%; padding: 9px 12px; border: 1px solid #dde3ec;
      border-radius: 8px; font-size: 14px; color: #1a1a2e;
      background: #fafbfd; margin-bottom: 14px;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus, input[type="number"]:focus, select:focus {
      outline: none; border-color: #185FA5; background: #fff;
    }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed #b8cfe8;
      border-radius: 10px;
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      background: #f5f8fd;
      transition: background 0.15s, border-color 0.15s;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      background: #e6f1fb; border-color: #185FA5;
    }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .drop-zone .dz-icon { font-size: 36px; margin-bottom: 10px; }
    .drop-zone p { font-size: 14px; color: #555; margin-bottom: 4px; }
    .drop-zone small { font-size: 12px; color: #888; }

    .file-selected {
      display: none; align-items: center; gap: 10px;
      background: #e6f1fb; border-radius: 8px;
      padding: 10px 14px; margin-top: 12px;
    }
    .file-selected.visible { display: flex; }
    .file-selected .fn { font-size: 13px; font-weight: 500; flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-selected .fs { font-size: 12px; color: #555; }
    .file-selected button { background: none; border: none; cursor: pointer;
      font-size: 16px; color: #888; padding: 0; }

    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 11px 20px; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary { background: #185FA5; color: #fff; width: 100%; margin-top: 4px; }
    .btn-primary:not(:disabled):hover { opacity: 0.88; }
    .btn-dl { background: #f0f4f9; color: #185FA5; border: 1px solid #b8cfe8; flex: 1; }
    .btn-dl:hover { background: #e6f1fb; }
    .btn-dl.verde { color: #2E6B0A; background: #eaf3de; border-color: #9bc96a; }
    .btn-dl.verde:hover { background: #dff0c8; }

    /* Progress */
    .progress-wrap { display: none; margin-top: 1rem; }
    .progress-wrap.visible { display: block; }
    .progress-bar-bg { background: #e8eef5; border-radius: 99px; height: 6px; overflow: hidden; margin-bottom: 8px; }
    .progress-bar    { height: 100%; background: #185FA5; border-radius: 99px;
                        transition: width 0.4s; width: 0%; }
    .progress-label  { font-size: 12px; color: #666; }

    /* Result */
    .result-card { display: none; background: #eaf3de; border: 1px solid #9bc96a;
      border-radius: 10px; padding: 1.25rem 1.5rem; margin-top: 1rem; }
    .result-card.visible { display: block; }
    .result-card h3 { font-size: 14px; font-weight: 600; color: #2E6B0A; margin-bottom: 4px; }
    .result-card p  { font-size: 13px; color: #3b6d11; margin-bottom: 1rem; }
    .dl-row { display: flex; gap: 10px; flex-wrap: wrap; }

    /* Error */
    .error-box { display: none; background: #fdeaea; border: 1px solid #e57373;
      border-radius: 8px; padding: 12px 16px; margin-top: 12px;
      font-size: 13px; color: #7a1212; }
    .error-box.visible { display: block; }

    /* Log */
    .log { font-family: monospace; font-size: 11px; color: #666;
      background: #f5f8fd; border-radius: 6px; padding: 10px 12px;
      max-height: 80px; overflow-y: auto; margin-top: 8px; display: none; }
    .log.visible { display: block; }
    .log p { margin: 0 0 2px; }
  </style>
</head>
<body>

<header>
  <div class="logo">🧠</div>
  <div>
    <h1>Adaptador de Questões — TDAH</h1>
    <p>Unilavras — Prof. Douglas Campideli Fonseca</p>
  </div>
</header>

<div class="container">

  <!-- Configurações -->
  <div class="card">
    <h2>⚙️ Configurações</h2>
    <label for="titulo">Título do documento</label>
    <input type="text" id="titulo" value="AVIN — 2026-1" placeholder="Ex.: AVIN — 2026-2">
    <div class="row">
      <div>
        <label for="fonte">Tamanho da fonte</label>
        <select id="fonte">
          <option value="11">11pt</option>
          <option value="12" selected>12pt (recomendado)</option>
          <option value="13">13pt</option>
          <option value="14">14pt</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Upload -->
  <div class="card">
    <h2>📄 Arquivo PDF</h2>
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".pdf">
      <div class="dz-icon">📎</div>
      <p>Arraste o PDF aqui ou clique para selecionar</p>
      <small>Somente arquivos .pdf com texto selecionável</small>
    </div>
    <div class="file-selected" id="fileSelected">
      <span>📄</span>
      <span class="fn" id="fileName"></span>
      <span class="fs" id="fileSize"></span>
      <button id="removeFile" title="Remover">✕</button>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
      <div class="progress-label" id="progressLabel">Iniciando...</div>
      <div class="log" id="log"></div>
    </div>

    <div class="error-box" id="errorBox"></div>

    <div class="result-card" id="resultCard">
      <h3>✅ Questões adaptadas com sucesso</h3>
      <p id="resultInfo"></p>
      <div class="dl-row">
        <button class="btn btn-dl" id="btnPdfQ">📄 PDF — Questões</button>
        <button class="btn btn-dl verde" id="btnPdfG">📋 PDF — Com Gabarito</button>
        <button class="btn btn-dl" id="btnDocx">📝 DOCX — Word</button>
      </div>
    </div>

    <button class="btn btn-primary" id="processBtn" disabled style="margin-top:1rem">
      ✨ Adaptar questões
    </button>
  </div>

</div>

<script>
  const $ = id => document.getElementById(id);
  let selectedFile = null;
  let dadosAdaptados = null;

  // Drop zone
  $('dropZone').addEventListener('dragover', e => { e.preventDefault(); $('dropZone').classList.add('drag-over'); });
  $('dropZone').addEventListener('dragleave', () => $('dropZone').classList.remove('drag-over'));
  $('dropZone').addEventListener('drop', e => {
    e.preventDefault(); $('dropZone').classList.remove('drag-over');
    handleFile(e.dataTransfer.files[0]);
  });
  $('fileInput').addEventListener('change', () => handleFile($('fileInput').files[0]));
  $('removeFile').addEventListener('click', () => {
    selectedFile = null;
    $('fileSelected').classList.remove('visible');
    $('processBtn').disabled = true;
    reset();
  });

  function handleFile(file) {
    if (!file || !file.name.toLowerCase().endsWith('.pdf')) {
      showError('Selecione um arquivo .pdf válido.'); return;
    }
    selectedFile = file;
    $('fileName').textContent = file.name;
    $('fileSize').textContent = (file.size / 1024).toFixed(0) + ' KB';
    $('fileSelected').classList.add('visible');
    $('processBtn').disabled = false;
    reset();
  }

  function reset() {
    $('progressWrap').classList.remove('visible');
    $('resultCard').classList.remove('visible');
    $('errorBox').classList.remove('visible');
    $('log').classList.remove('visible');
    $('log').innerHTML = '';
    $('progressBar').style.width = '0%';
    dadosAdaptados = null;
  }

  function setProgress(pct, label) {
    $('progressBar').style.width = pct + '%';
    $('progressLabel').textContent = label;
  }

  function addLog(msg) {
    $('log').classList.add('visible');
    const p = document.createElement('p');
    p.textContent = '› ' + msg;
    $('log').appendChild(p);
    $('log').scrollTop = $('log').scrollHeight;
  }

  function showError(msg) {
    $('errorBox').textContent = '⚠ ' + msg;
    $('errorBox').classList.add('visible');
  }

  // Processar
  $('processBtn').addEventListener('click', async () => {
    if (!selectedFile) return;
    reset();
    $('processBtn').disabled = true;
    $('progressWrap').classList.add('visible');

    try {
      setProgress(10, 'Enviando PDF...');
      addLog('Arquivo: ' + selectedFile.name);

      const form = new FormData();
      form.append('arquivo', selectedFile);
      form.append('titulo', $('titulo').value || 'AVIN — 2026-1');
      form.append('fonte', $('fonte').value);

      setProgress(30, 'Adaptando questões via IA...');
      addLog('Processando com Claude...');

      const res = await fetch('/processar', { method: 'POST', body: form });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || 'Erro no servidor');
      }

      dadosAdaptados = await res.json();

      setProgress(100, 'Concluído!');
      addLog(`${dadosAdaptados.total} questão(ões) adaptada(s)`);

      $('resultInfo').textContent =
        `${dadosAdaptados.total} questões adaptadas. Escolha o formato para baixar:`;
      $('resultCard').classList.add('visible');

    } catch (err) {
      showError(err.message);
      setProgress(0, 'Falha');
    } finally {
      $('processBtn').disabled = false;
    }
  });

  // Downloads
  async function baixar(endpoint, nomeArquivo) {
    if (!dadosAdaptados) return;
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(dadosAdaptados),
    });
    if (!res.ok) { showError('Erro ao gerar arquivo.'); return; }
    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = nomeArquivo; a.click();
    URL.revokeObjectURL(url);
  }

  $('btnPdfQ').addEventListener('click', () =>
    baixar('/baixar/pdf-questoes', ($('titulo').value || 'AVIN') + '_questoes.pdf'));
  $('btnPdfG').addEventListener('click', () =>
    baixar('/baixar/pdf-gabarito', ($('titulo').value || 'AVIN') + '_com_gabarito.pdf'));
  $('btnDocx').addEventListener('click', () =>
    baixar('/baixar/docx', ($('titulo').value || 'AVIN') + '_questoes.docx'));
</script>
</body>
</html>
